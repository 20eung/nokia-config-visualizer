# iframe 컨텍스트 감지 (Sec-Fetch-Dest: iframe → 포털에서 iframe으로 로드됨)
map $http_sec_fetch_dest $ncv_iframe_request {
    "iframe"    1;
    default     0;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 실제 클라이언트 IP 전달 (프록시 사용 시)
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # ============================================================
    # Health Check 엔드포인트 (인증 없음 - 모니터링용)
    # ============================================================
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ============================================================
    # Authentik Forward Auth: Outpost 프록시 엔드포인트
    # auth_request 없음 (무한루프 방지)
    # ============================================================
    location /outpost.goauthentik.io {
        proxy_pass http://authentik-server:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_buffer_size 8k;
    }

    # Authentik 미인증 시 로그인 페이지로 리다이렉트
    location @goauthentik_proxy_signin {
        internal;

        # iframe 컨텍스트에서 인증 실패 시:
        # auth.hub.sk-net.com은 X-Frame-Options로 iframe 내 로드가 차단됨
        # → TOP 프레임(포털 전체)을 Nokia Visualizer 인증 흐름으로 리다이렉트
        # → 인증 완료 후 App.tsx가 자동으로 포털 /visualizer 로 복귀
        if ($ncv_iframe_request) {
            return 200 '<html><head><meta charset="utf-8"></head><body><script>window.top.location.href="https://ncv.hub.sk-net.com/?_pr=1";</script></body></html>';
        }

        add_header Set-Cookie $auth_cookie;
        return 302 /outpost.goauthentik.io/start?rd=$request_uri;
    }

    # ============================================================
    # API 프록시 → Express 백엔드 (인증 적용)
    # ============================================================
    location /api/ {
        # Authentik Forward Auth
        auth_request /outpost.goauthentik.io/auth/nginx;
        error_page 401 = @goauthentik_proxy_signin;
        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;

        # 인증된 사용자 정보를 백엔드에 전달
        auth_request_set $authentik_username $upstream_http_x_authentik_username;
        auth_request_set $authentik_groups   $upstream_http_x_authentik_groups;
        auth_request_set $authentik_email    $upstream_http_x_authentik_email;

        proxy_pass http://nokia-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Authentik-Username $authentik_username;
        proxy_set_header X-Authentik-Groups   $authentik_groups;
        proxy_set_header X-Authentik-Email    $authentik_email;
        proxy_read_timeout 120s;
    }

    # ============================================================
    # WebSocket 프록시 (인증 적용)
    # ============================================================
    location /ws {
        # Authentik Forward Auth
        auth_request /outpost.goauthentik.io/auth/nginx;
        error_page 401 = @goauthentik_proxy_signin;
        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;

        proxy_pass http://nokia-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ============================================================
    # SPA 라우팅 지원 (인증 적용)
    # ============================================================
    location / {
        # Authentik Forward Auth
        auth_request /outpost.goauthentik.io/auth/nginx;
        error_page 401 = @goauthentik_proxy_signin;
        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;

        try_files $uri $uri/ /index.html;

        # 보안 헤더
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self'; frame-ancestors 'self' https://portal.hub.sk-net.com;" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "clipboard-write=*, clipboard-read=*" always;
    }

    # ============================================================
    # 정적 파일 캐싱 최적화 (인증 적용)
    # ============================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # Authentik Forward Auth
        auth_request /outpost.goauthentik.io/auth/nginx;
        error_page 401 = @goauthentik_proxy_signin;
        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;

        expires 1y;
        add_header Cache-Control "public, immutable";

        # 보안 헤더
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self'; frame-ancestors 'self' https://portal.hub.sk-net.com;" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "clipboard-write=*, clipboard-read=*" always;
    }

    # ============================================================
    # HTML 파일은 캐싱하지 않음 (인증 적용)
    # ============================================================
    location ~* \.html$ {
        # Authentik Forward Auth
        auth_request /outpost.goauthentik.io/auth/nginx;
        error_page 401 = @goauthentik_proxy_signin;
        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;

        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        # 보안 헤더
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self'; frame-ancestors 'self' https://portal.hub.sk-net.com;" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "clipboard-write=*, clipboard-read=*" always;
    }

    # Gzip 압축 활성화
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 보안 헤더 (server 레벨)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self'; frame-ancestors 'self' https://portal.hub.sk-net.com;" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "clipboard-write=*, clipboard-read=*" always;
}
