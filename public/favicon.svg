<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- 배경 라운드 사각형 -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bgGrad)" />

  <!-- 네트워크 링크 (노드 연결선) -->
  <g stroke="url(#linkGrad)" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <!-- 중앙 허브에서 주변 노드로 -->
    <line x1="64" y1="58" x2="34" y2="30" />
    <line x1="64" y1="58" x2="94" y2="30" />
    <line x1="64" y1="58" x2="30" y2="72" />
    <line x1="64" y1="58" x2="98" y2="72" />
    <line x1="64" y1="58" x2="40" y2="100" />
    <line x1="64" y1="58" x2="88" y2="100" />
    <!-- 외곽 노드 간 연결 (메시 구조) -->
    <line x1="34" y1="30" x2="94" y2="30" />
    <line x1="30" y1="72" x2="40" y2="100" />
    <line x1="98" y1="72" x2="88" y2="100" />
  </g>

  <!-- 네트워크 노드 (외곽) -->
  <circle cx="34" cy="30" r="8" fill="#ffffff" opacity="0.95" />
  <circle cx="94" cy="30" r="8" fill="#ffffff" opacity="0.95" />
  <circle cx="30" cy="72" r="7" fill="#34d399" opacity="0.95" />
  <circle cx="98" cy="72" r="7" fill="#34d399" opacity="0.95" />
  <circle cx="40" cy="100" r="7" fill="#fbbf24" opacity="0.95" />
  <circle cx="88" cy="100" r="7" fill="#fbbf24" opacity="0.95" />

  <!-- 중앙 코어 노드 (가장 큼 - 라우터/코어 스위치 상징) -->
  <circle cx="64" cy="58" r="14" fill="#ffffff" />
  <circle cx="64" cy="58" r="10" fill="none" stroke="#2563eb" stroke-width="2.5" />
  <!-- 코어 노드 내부 십자 (라우터 심볼) -->
  <line x1="58" y1="58" x2="70" y2="58" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" />
  <line x1="64" y1="52" x2="64" y2="64" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" />

  <!-- 외곽 노드 내부 작은 점 (장비 표시) -->
  <circle cx="34" cy="30" r="3" fill="#2563eb" />
  <circle cx="94" cy="30" r="3" fill="#2563eb" />
  <circle cx="30" cy="72" r="2.5" fill="#059669" />
  <circle cx="98" cy="72" r="2.5" fill="#059669" />
  <circle cx="40" cy="100" r="2.5" fill="#d97706" />
  <circle cx="88" cy="100" r="2.5" fill="#d97706" />
</svg>
